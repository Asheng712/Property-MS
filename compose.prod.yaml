# ============================================
# 生产环境 — 资源限制 + 密钥管理 + 健康检查
# 启动: docker compose -f compose.prod.yaml up -d --build
# ============================================

services:
  frontend:
    build:
      context: ./frontend
      target: runtime
    image: wisdompm/frontend:${VERSION:-latest}
    container_name: wisdom-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.50"
        reservations:
          memory: 64M
          cpus: "0.25"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run

  backend:
    build:
      context: ./backend
      target: runtime
    image: wisdompm/backend:${VERSION:-latest}
    container_name: wisdom-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      DB_URL: jdbc:mysql://db:3306/property_ms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env.secrets                    # 密钥文件（gitignore），启动时注入环境变量
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/auth/login || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
        reservations:
          memory: 256M
          cpus: "0.50"

  db:
    image: mysql:8.4
    container_name: wisdom-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: property_ms
      MYSQL_USER: ${DB_USERNAME:-wisdom}
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    secrets:
      - db_password
      - mysql_root_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$$(cat /run/secrets/db_password) --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
        reservations:
          memory: 256M
          cpus: "0.50"

volumes:
  mysql_prod_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
