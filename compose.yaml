# ============================================
# 开发环境 — 热重载 + 源码挂载
# 启动: docker compose up -d --build
# 停止: docker compose down
# ============================================

services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: wisdom-frontend-dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: http://backend:8080
    volumes:
      - ./frontend:/app               # 源码挂载 → Vite HMR 热更新
      - /app/node_modules             # 保留容器内依赖，不被宿主机覆盖
    depends_on:
      backend:
        condition: service_started

  mobile:
    build:
      context: ./frontend-mobile
      target: dev
    container_name: wisdom-mobile-dev
    restart: unless-stopped
    ports:
      - "${MOBILE_PORT:-5174}:5174"
    environment:
      VITE_API_URL: http://backend:8080
    volumes:
      - ./frontend-mobile:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      target: dev                     # 使用 dev 阶段（mvn spring-boot:run + DevTools）
    container_name: wisdom-backend-dev
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      DB_URL: jdbc:mysql://db:3306/property_ms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      DB_USERNAME: ${DB_USERNAME:-wisdom}
      DB_PASSWORD: ${DB_PASSWORD:-wisdom_dev123}
      JWT_SECRET: ${JWT_SECRET:-wisdom-dev-secret-change-me}
    volumes:
      - ./backend:/app                # 源码挂载 → DevTools 检测 class 变化自动重启
      - maven-repo:/root/.m2          # Maven 本地仓库缓存，加速重复构建
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: wisdom-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: property_ms
      MYSQL_USER: ${DB_USERNAME:-wisdom}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wisdom_dev123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev123}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_dev_data:
  maven-repo:
