# ============================================
# 开发环境 — 热重载 + 源码挂载
# 启动: cp .env.example .env && docker compose up -d --build
# 停止: docker compose down
# ============================================

services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: wisdom-frontend-dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: http://backend:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started

  mobile:
    build:
      context: ./frontend-mobile
      target: dev
    container_name: wisdom-mobile-dev
    restart: unless-stopped
    ports:
      - "${MOBILE_PORT:-5174}:5174"
    environment:
      VITE_API_URL: http://backend:8080
    volumes:
      - ./frontend-mobile:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      target: dev
    container_name: wisdom-backend-dev
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SERVER_PORT: "8080"
      DB_URL: jdbc:mysql://db:3306/property_ms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./backend:/app
      - maven-repo:/root/.m2
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: wisdom-mysql-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: property_ms
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_dev_data:
  maven-repo:
