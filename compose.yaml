services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: wisdom-frontend-dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

  backend:
    build: ./backend
    container_name: wisdom-backend-dev
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://db:3306/property_ms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      DB_USERNAME: ${DB_USERNAME:-wisdom}
      DB_PASSWORD: ${DB_PASSWORD:-wisdom_dev123}
      JWT_SECRET: ${JWT_SECRET:-wisdom-dev-secret-change-me}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: wisdom-mysql-dev
    environment:
      MYSQL_DATABASE: property_ms
      MYSQL_USER: ${DB_USERNAME:-wisdom}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wisdom_dev123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  frontend_node_modules:
  mysql_data:
