server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wisdom_pm?serverTimezone=GMT%2B8
    username: root
    password: your_password
   
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j 配置
knife4j:
  enable: true
  openapi:
    title: 智慧物业管理系统API文档
    description: "React + SpringBoot 全栈项目"
    group:
      default:
        group-name: 业务接口
        api-package: com.wisdom.controller