server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

knife4j:
  enable: true
  openapi:
    title: 智慧物业管理系统API文档
    description: "React + SpringBoot 全栈项目"
    group:
      default:
        group-name: 业务接口
        api-package: com.wisdom.controller

jwt:
  secret: ${JWT_SECRET}