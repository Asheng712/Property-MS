server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${DB_URL:jdbc:mysql://localhost:3306/example_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

knife4j:
  enable: true
  openapi:
    title: 智慧物业管理系统API文档
    description: "React + SpringBoot 全栈项目"
    group:
      default:
        group-name: 业务接口
        api-package: com.wisdom.controller

jwt:
  secret: ${JWT_SECRET:wisdom-property-management-system-jwt-secret-key-2026}