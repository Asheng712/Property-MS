name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Verify
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Check Deployment Config
        id: check
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "DEPLOY_HOST not configured, skipping deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        if: steps.check.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            if [ -d /opt/wisdom-pm/.git ]; then
              cd /opt/wisdom-pm
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /opt/wisdom-pm
              cd /opt/wisdom-pm
            fi

            # 生产部署
            docker compose -f compose.prod.yaml up -d --build --remove-orphans

            # 健康检查
            sleep 15
            curl -f http://localhost:80/health || echo "[WARN] Health check failed"
