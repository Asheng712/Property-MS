name: Security Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  frontend-audit:
    name: Frontend dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  notify:
    name: Notify
    needs: [gitleaks, frontend-audit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Set status
        id: status
        run: |
          if [ "${{ needs.gitleaks.result }}" = "success" ] && [ "${{ needs.frontend-audit.result }}" = "success" ]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "result=通过" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "result=发现风险" >> $GITHUB_OUTPUT
          fi
      - name: Send notification
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.MAIL_SERVER || 'smtp.163.com' }}
          server_port: ${{ secrets.MAIL_PORT || '587' }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ steps.status.outputs.emoji }} 安全扫描${{ steps.status.outputs.result }} — ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: ${{ secrets.MAIL_FROM || secrets.MAIL_USERNAME }}
          body: |
            仓库：${{ github.repository }}
            分支：${{ github.ref_name }}
            提交：${{ github.sha }}
            结果：${{ steps.status.outputs.result }}

            工作流：${{ github.workflow }}
            详情：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
