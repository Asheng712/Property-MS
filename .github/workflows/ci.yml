name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests and coverage
        run: mvn -B -pl wisdom-server -am verify

      - name: Upload backend coverage
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/wisdom-server/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
          verbose: true

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: http://localhost:8080

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests with coverage
        run: npm test

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
          verbose: true

  notify:
    name: Notify
    needs: [backend, frontend]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.MAIL_SERVER || 'smtp.qq.com' }}
          server_port: ${{ secrets.MAIL_PORT || '587' }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CI 构建失败 — ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: ${{ secrets.MAIL_FROM || secrets.MAIL_USERNAME }}
          body: |
            仓库：${{ github.repository }}
            分支：${{ github.ref_name }}
            提交：${{ github.sha }}
            作者：${{ github.actor }}

            工作流：${{ github.workflow }}
            详情：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
